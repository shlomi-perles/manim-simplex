target-version = "py313"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
  "E", "W",       # pycodestyle
  "F",            # pyflakes
  "I",            # isort
  "N",            # pep8-naming
  "B",            # bugbear
  "UP",           # pyupgrade
  "SIM",          # simplify
  "TID",          # tidy imports
  "PTH",          # use pathlib
  "RUF",          # ruff
  "S",            # bandit (security)
  "PT",           # pytest style
  "C4",           # comprehensions
  "DTZ",          # datetime tz
  "T20",          # no print
  "FA",           # future-annotations (banned via UP)
]
ignore = [
  "E501",         # line length: handled by formatter, soft cap
  "S101",         # asserts ok in tests
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "T20"]
"examples/**/*.py" = ["T20"]

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.isort]
known-first-party = ["simplex"]

[format]
quote-style = "double"
indent-style = "space"
