extend-exclude = [".claude/"]
line-length = 100
src = ["src", "tests"]
target-version = "py313"

[format]
indent-style = "space"
quote-style = "double"

[lint]
ignore = [
  "E501",  # line length: handled by formatter, soft cap
  "S101",  # asserts ok in tests
]
select = [
  "E",
  "W",  # pycodestyle
  "F",  # pyflakes
  "I",  # isort
  "N",  # pep8-naming
  "B",  # bugbear
  "UP",  # pyupgrade
  "SIM",  # simplify
  "TID",  # tidy imports
  "PTH",  # use pathlib
  "RUF",  # ruff
  "S",  # bandit (security)
  "PT",  # pytest style
  "C4",  # comprehensions
  "DTZ",  # datetime tz
  "T20",  # no print
  "FA",  # future-annotations (banned via UP)
]

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.isort]
known-first-party = ["simplex"]

[lint.per-file-ignores]
"examples/**/*.py" = ["T20"]
"tests/**/*.py" = ["S101", "T20"]
